name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: python -m pytest tests/ -v --tb=short
      - name: Build wheel
        run: python -m build
      - name: Verify installed wheel exposes MCP tools
        run: |
          python -m venv .release-venv
          .release-venv/bin/python -m pip install dist/*.whl
          .release-venv/bin/python - <<'PY'
          import asyncio
          import shutil
          import sys
          from pathlib import Path

          from fastmcp import Client
          from fastmcp.client.transports import StdioTransport


          async def verify() -> None:
              executable = Path(sys.executable).parent / "cartographer-mcp"
              assert executable.is_file(), executable
              async with Client(
                  StdioTransport(command=str(executable), args=[], cwd=str(Path.cwd())), timeout=20
              ) as client:
                  tools = await client.list_tools()
              assert {tool.name for tool in tools} == {
                  "analyze_repo",
                  "search_graph",
                  "trace_flow",
                  "find_issues",
                  "get_metrics",
                  "visualize",
                  "get_git_context",
              }


          asyncio.run(verify())
          PY
